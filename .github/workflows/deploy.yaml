name: EPF Cloud Run Manual Deploy

# Manual fallback only.
# Production deploys are driven by `.github/workflows/release.yaml` on release tags.

on:
  workflow_dispatch:
    inputs:
      image_ref:
        description: Full Artifact Registry image reference to deploy (digest preferred)
        required: false
        type: string
      image_tag:
        description: Artifact Registry tag to resolve to an immutable digest when image_ref is empty
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-epf-strategy
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: outblocks
  GCP_REGION: europe-west1
  SERVICE_NAME: epf-strategy
  SERVICE_DOMAIN: strategy.emergent-company.ai
  REGISTRY_REPO: epf
  IMAGE_NAME: epf-server
  RUNTIME_SERVICE_ACCOUNT: epf-runtime@outblocks.iam.gserviceaccount.com

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve Cloud Run secrets
        id: secrets
        run: |
          SECRET_BINDINGS="EPF_OAUTH_CLIENT_ID=epf-oauth-client-id:latest,EPF_OAUTH_CLIENT_SECRET=epf-oauth-client-secret:latest,EPF_SESSION_SECRET=epf-session-secret:latest,EPF_GITHUB_APP_ID=epf-github-app-id:latest,EPF_GITHUB_APP_PRIVATE_KEY=epf-github-app-private-key:latest"

          for OPTIONAL in \
            "EPF_GITHUB_APP_CLIENT_ID=epf-github-app-client-id" \
            "EPF_GITHUB_APP_CLIENT_SECRET=epf-github-app-client-secret"; do
            ENV_NAME="${OPTIONAL%%=*}"
            SECRET_NAME="${OPTIONAL#*=}"
            SECRET_VERSION="$(gcloud secrets versions list "${SECRET_NAME}" \
              --project="${GCP_PROJECT_ID}" \
              --filter='state=enabled' \
              --limit=1 \
              --format='value(name)' 2>/dev/null || true)"

            if [[ -n "${SECRET_VERSION}" ]]; then
              SECRET_BINDINGS+="${SECRET_BINDINGS:+,}${ENV_NAME}=${SECRET_NAME}:latest"
            fi
          done

          echo "secret_bindings=${SECRET_BINDINGS}" >> "$GITHUB_OUTPUT"

      - name: Resolve image reference
        id: image
        run: |
          if [[ -z "${{ github.event.inputs.image_ref }}" && -z "${{ github.event.inputs.image_tag }}" ]]; then
            echo "Provide image_ref or image_tag." >&2
            exit 1
          fi

          if [[ -n "${{ github.event.inputs.image_ref }}" ]]; then
            IMAGE_REF="${{ github.event.inputs.image_ref }}"
          else
            IMAGE_REF="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${REGISTRY_REPO}/${IMAGE_NAME}:${{ github.event.inputs.image_tag }}"
          fi

          if [[ "${IMAGE_REF}" == *@sha256:* ]]; then
            RESOLVED_IMAGE_REF="${IMAGE_REF}"
          else
            DIGEST="$(gcloud artifacts docker images describe "${IMAGE_REF}" \
              --project="${GCP_PROJECT_ID}" \
              --format='value(image_summary.digest)')"

            if [[ -z "${DIGEST}" ]]; then
              echo "Could not resolve digest for ${IMAGE_REF}" >&2
              exit 1
            fi

            RESOLVED_IMAGE_REF="${IMAGE_REF%%:*}@${DIGEST}"
          fi

          echo "image_ref=${RESOLVED_IMAGE_REF}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE_NAME}" \
            --image="${{ steps.image.outputs.image_ref }}" \
            --region="${GCP_REGION}" \
            --project="${GCP_PROJECT_ID}" \
            --platform=managed \
            --allow-unauthenticated \
            --service-account="${RUNTIME_SERVICE_ACCOUNT}" \
            --port=8080 \
            --min-instances=0 \
            --max-instances=10 \
            --memory=512Mi \
            --cpu=1 \
            --timeout=300 \
            --set-env-vars="EPF_SERVER_MODE=strategy,EPF_SERVER_URL=https://${SERVICE_DOMAIN}" \
            --set-secrets="${{ steps.secrets.outputs.secret_bindings }}" \
            --args="serve,--http,--sse,--port,8080,--cors-origins=*" \
            --cpu-boost \
            --execution-environment=gen2

      - name: Verify deployment health
        run: |
          SERVICE_URL="$(gcloud run services describe "${SERVICE_NAME}" \
            --region="${GCP_REGION}" \
            --project="${GCP_PROJECT_ID}" \
            --format='value(status.url)')"

          echo "Service URL: ${SERVICE_URL}"
          curl --fail --silent --show-error "${SERVICE_URL}/health"

          if gcloud beta run domain-mappings describe "${SERVICE_DOMAIN}" \
            --region="${GCP_REGION}" \
            --project="${GCP_PROJECT_ID}" >/dev/null 2>&1; then
            echo "Public URL: https://${SERVICE_DOMAIN}"
            curl --fail --silent --show-error "https://${SERVICE_DOMAIN}/health"
          else
            echo "Skipping custom-domain health check; domain mapping is not configured yet."
          fi

          echo ""
          echo "Manual deploy complete"
          echo "  Image: ${{ steps.image.outputs.image_ref }}"
          echo "  URL:   ${SERVICE_URL}"
