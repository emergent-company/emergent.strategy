name: EPF CLI Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.EPF_CANONICAL_TOKEN }}

      - name: Clone epf-canonical
        run: git clone --depth 1 https://x-access-token:${{ secrets.EPF_CANONICAL_TOKEN }}@github.com/emergent-company/epf-canonical.git "$RUNNER_TEMP/canonical-epf"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/epf-cli/go.mod
          cache-dependency-path: apps/epf-cli/go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean -f apps/epf-cli/.goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.EPF_CANONICAL_TOKEN }}
          CANONICAL_EPF_PATH: ${{ runner.temp }}/canonical-epf

  docker:
    name: Docker (GHCR)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.EPF_CANONICAL_TOKEN }}

      - name: Extract version from tag
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(echo ${GITHUB_SHA} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/epf-cli
          file: apps/epf-cli/Dockerfile
          push: true
          tags: |
            ghcr.io/emergent-company/epf-server:latest
            ghcr.io/emergent-company/epf-server:${{ steps.meta.outputs.version }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            GIT_COMMIT=${{ steps.meta.outputs.short_sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          secrets: |
            gh_token=${{ secrets.EPF_CANONICAL_TOKEN }}
          platforms: linux/amd64,linux/arm64
