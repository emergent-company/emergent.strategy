version: '3'

vars:
  BINARY: strategy-server
  BUILD_DIR: build

tasks:
  build:
    desc: Build the production binary
    deps: [css, generate]
    cmds:
      - go build -ldflags "-s -w" -o {{.BUILD_DIR}}/{{.BINARY}} .
    generates:
      - "{{.BUILD_DIR}}/{{.BINARY}}"

  build-server:
    desc: Build the server binary (alias for build)
    cmds:
      - task: build

  run:
    desc: Run the server in development mode (sources .env.local if present)
    cmds:
      - |
        if [ -f .env.local ]; then
          set -a; source .env.local; set +a
        fi
        go run . server

  dev-up:
    desc: "Start full local dev environment (Postgres + server). Use -- --with-memory for semantic features."
    cmds:
      - ./scripts/dev-setup.sh {{.CLI_ARGS}}

  dev-up-full:
    desc: Start full local dev environment with Memory (semantic features enabled)
    cmds:
      - ./scripts/dev-setup.sh --with-memory

  dev-deps:
    desc: Start containers only (no server), write .env.local
    cmds:
      - ./scripts/dev-setup.sh --deps-only {{.CLI_ARGS}}

  dev-down:
    desc: Stop all Docker containers and clean up
    cmds:
      - docker compose down
      - echo "Containers stopped. .env.local preserved."

  dev-reset:
    desc: Full reset — stop containers, remove volumes, delete .env.local
    cmds:
      - docker compose down -v
      - rm -f .env.local
      - echo "Reset complete. Run 'task dev-up' to start fresh."

  docker-deps:
    desc: Start Postgres in Docker and wait until ready
    cmds:
      - docker compose up -d postgres
      - docker compose exec postgres sh -c 'until pg_isready -U strategy; do sleep 1; done'

  docker-deps-memory:
    desc: Start Postgres and Memory server in Docker
    cmds:
      - docker compose up -d postgres memory
      - docker compose exec postgres sh -c 'until pg_isready -U strategy; do sleep 1; done'
      - |
        for i in $(seq 1 30); do
          if curl -sf http://localhost:8787/health >/dev/null 2>&1; then
            echo "Memory server is healthy"
            break
          fi
          if [ "$i" -eq 30 ]; then
            echo "Memory server not healthy after 30s"
            exit 1
          fi
          sleep 1
        done

  setup-memory:
    desc: Create Memory project and install EPF schemas
    cmds:
      - ./scripts/setup-memory.sh

  db:migrate:
    desc: Run pending database migrations
    cmds:
      - go run . db --migrate

  db:reset:
    desc: Drop and recreate the database (dev only)
    cmds:
      - go run . db --reset

  format:
    desc: Format all Go source files
    cmds:
      - gofmt -w .

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  test:
    desc: Run all tests (requires docker-deps)
    cmds:
      - go test ./...

  test-verbose:
    desc: Run all tests with verbose output
    cmds:
      - go test -v ./...

  test-e2e:
    desc: Run end-to-end tests
    cmds:
      - go test -v ./tests/e2e/...

  test-race:
    desc: Run tests with race detector
    cmds:
      - go test -race ./...

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BUILD_DIR}}

  dev:
    desc: Start development server with live reload (requires air)
    cmds:
      - air

  css:
    desc: Build Tailwind CSS (requires Node.js and go-daisy)
    dir: web
    cmds:
      - npm run build

  css-watch:
    desc: Watch and rebuild Tailwind CSS
    dir: web
    cmds:
      - npm run watch

  generate:
    desc: Run all code generators (templ, etc.)
    cmds:
      - templ generate ./...

  sync-embedded:
    desc: Sync canonical EPF content into internal/embedded/ for go:embed
    cmds:
      - ./scripts/sync-embedded.sh {{.CANONICAL_EPF_PATH | default ""}}
    vars:
      CANONICAL_EPF_PATH: '{{.CANONICAL_EPF_PATH | default ""}}'

  check:
    desc: Run format, lint, and test (CI equivalent)
    cmds:
      - task: format
      - task: lint
      - task: test
