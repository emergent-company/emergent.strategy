name: market-mapper
version: "1.0.0"
type: analysis
phase: READY
description: "Rapidly maps the market landscape including TAM/SAM/SOM sizing, competitive quick sketch, white space identification, and user segment analysis."

capability:
  class: balanced
  context_budget: medium

requires:
  artifacts: []
  optional:
    - insight_analyses
  tools:
    - epf_get_template

output:
  format: yaml
  artifact_type: insight_analyses

scope:
  preferred_tools:
    - epf_get_template
    - epf_get_schema
    - epf_validate_file
    - epf_get_competitive_position
  avoid_tools:
    - epf_scaffold_generator
    - epf_init_instance
    - epf_aim_assess
