name: investor-memo
version: "1.0.0"
type: generation
description: "Creates comprehensive investor materials from EPF strategy data, including executive summary, market analysis, competitive positioning, and traction metrics."
category: investor
author: "EPF Framework"

capability:
  class: high-reasoning
  context_budget: large

requires:
  artifacts:
    - north_star
    - strategy_formula
    - roadmap_recipe
  optional:
    - personas
    - value_model
    - insight_analyses
    - feature_definition
  tools:
    - epf_get_product_vision
    - epf_get_competitive_position
    - epf_get_roadmap_summary

output:
  format: markdown
  schema: schema.json
  validator: validator.sh

files:
  prompt: wizard.instructions.md
  schema: schema.json
  validator: validator.sh

scope:
  preferred_tools:
    - epf_get_product_vision
    - epf_get_personas
    - epf_get_competitive_position
    - epf_get_roadmap_summary
    - epf_get_value_propositions
    - epf_search_strategy
  avoid_tools:
    - epf_init_instance
    - epf_scaffold_generator
