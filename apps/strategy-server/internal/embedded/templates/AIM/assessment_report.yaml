# EPF v2.0.0 - Assessment Report Template
# Assessment Report (AIM Phase)
# This document is generated by the Synthesizer AI agent at the end of a cycle.
# It provides a data-driven assessment of performance against the OKRs and Key Results
# defined in 05_roadmap_recipe.yaml.
#
# NOTE: Assessments focus on OKR/KR-level outcomes and assumption validation.
# Work package outcomes are tracked in spec-driven development tools.
# Key Results are the "meta work package" - the measurable milestones that matter strategically.
#
# IMPORTANT: okr_assessments and assumption_validations are FLAT arrays.
# Do NOT nest them by track — the schema expects a flat list.
#
# Related Resources:
# - Schema: ../../schemas/assessment_report_schema.json
# - Wizard: ../../wizards/synthesizer.agent_prompt.md

roadmap_id: "roadmap-001" # Reference to the roadmap being assessed
cycle: 1

# OKR Assessments — flat array, one entry per OKR across all tracks
okr_assessments:
  - okr_id: "okr-p-001" # Product track OKR
    assessment: "Initial assessment pending cycle completion. Summarize what was achieved, what evidence supports it, and what surprised us."
    key_result_outcomes:
      - kr_id: "kr-p-001"
        target: "TBD"
        actual: "TBD"
        status: "partially_met" # exceeded, met, partially_met, missed
        learnings:
          - "What we learned from pursuing this KR — connect outcome to strategic implications"
      - kr_id: "kr-p-002"
        target: "TBD"
        actual: "TBD"
        status: "met"
        learnings:
          - "What we learned from this KR — link evidence to conclusion"
    data_summary:
      quantitative:
        - metric: "Example product metric"
          target: "TBD"
          actual: "TBD"
          variance: "TBD"
      qualitative:
        - source: "User interviews (n=TBD)"
          insight: "Example insight from user feedback — explain why numbers are what they are"
    cross_functional_insights:
      - "How teams collaborated on this OKR — what helped or hindered progress across functions"

  - okr_id: "okr-s-001" # Strategy track OKR
    assessment: "Initial assessment pending cycle completion. What did we achieve for this strategic objective?"
    key_result_outcomes:
      - kr_id: "kr-s-001"
        target: "TBD"
        actual: "TBD"
        status: "met"
        learnings:
          - "Strategy learning — connect to strategic assumptions and competitive positioning"
    data_summary:
      quantitative:
        - metric: "Example strategy metric"
          target: "TBD"
          actual: "TBD"
          variance: "TBD"
      qualitative:
        - source: "Market analysis"
          insight: "Example strategic insight from market observation"

# Assumption Validations — flat array, one entry per assumption across all tracks
# IDs use the asm- prefix matching roadmap_recipe riskiest_assumptions (e.g., asm-p-001, asm-s-001)
assumption_validations:
  - id: "asm-p-001" # Product track assumption
    status: "pending" # validated, invalidated, inconclusive, pending
    evidence: "Evidence pending — cite specific data, metrics, or observations that informed this assessment"
    confidence_change: "no change" # increased, decreased, no change

  - id: "asm-s-001" # Strategy track assumption
    status: "pending"
    evidence: "Evidence pending — include both supporting and contradicting data points"
    confidence_change: "no change"

# Cross-Track Strategic Insights — patterns that emerged across OKRs and tracks
strategic_insights:
  - "Key strategic insight from this cycle — connect multiple data points into actionable patterns"
  - "How the four tracks worked together (or didn't) — cross-functional collaboration patterns"
  - "Cross-track dependencies that created value or friction — inform next cycle planning"

# Next Cycle Recommendations — actions for the next READY phase, flow into Calibration Memo
next_cycle_recommendations:
  - "Recommendation for next READY phase — cite evidence from this assessment, be actionable at strategic level"

# Optional metadata — written automatically by EPF CLI tools
meta:
  epf_version: "2.0.0"
  last_updated: null
