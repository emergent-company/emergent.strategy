version: "2"

linters:
  enable:
    - errcheck
    - staticcheck
    - gocyclo
    - govet
    - ineffassign
    - unused

  settings:
    errcheck:
      check-type-assertions: true
    gocyclo:
      min-complexity: 15

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    - text: 'Error return value of .* is not checked'
      linters:
        - errcheck
