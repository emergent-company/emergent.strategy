# EPF Cloud Server — Docker Compose
#
# Quick start:
#   1. Copy .env.example to .env and fill in your values
#   2. Place your GitHub App .pem key alongside this file (or update the volume path)
#   3. export GITHUB_TOKEN=<your-pat-with-epf-canonical-access>
#   4. Run: docker compose up --build
#
# Health check:
#   curl http://localhost:8080/health

services:
  epf-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: "${EPF_VERSION:-dev}"
        GIT_COMMIT: "${GIT_COMMIT:-dev}"
      secrets:
        - gh_token
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - .env
    volumes:
      # Mount the GitHub App private key into the container.
      # Update the source path if your .pem file is elsewhere.
      - ./private-key.pem:/secrets/private-key.pem:ro
    environment:
      - PORT=8080
      # Override the key path to point at the mounted file.
      - EPF_GITHUB_APP_PRIVATE_KEY=/secrets/private-key.pem
    restart: unless-stopped

secrets:
  gh_token:
    environment: GITHUB_TOKEN
