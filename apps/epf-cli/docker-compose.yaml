# EPF Cloud Server — Docker Compose
#
# Quick start (single-tenant — one repo, no user auth):
#   1. Copy .env.example to .env, fill in GitHub App + repo values
#   2. Place your GitHub App .pem key alongside this file
#   3. export GITHUB_TOKEN=<your-pat-with-epf-canonical-access>
#   4. Run: docker compose up --build
#
# Quick start (multi-tenant — GitHub OAuth, workspace discovery):
#   1. Copy .env.example to .env, fill in OAuth values
#   2. Set EPF_OAUTH_CLIENT_ID, EPF_OAUTH_CLIENT_SECRET, EPF_SESSION_SECRET
#   3. export GITHUB_TOKEN=<your-pat-with-epf-canonical-access>
#   4. Run: docker compose up --build
#
# Health check:
#   curl http://localhost:8080/health
#
# Workspace discovery (multi-tenant):
#   curl -H "Authorization: Bearer <jwt>" http://localhost:8080/workspaces

services:
  epf-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: "${EPF_VERSION:-dev}"
        GIT_COMMIT: "${GIT_COMMIT:-dev}"
      secrets:
        - gh_token
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - PORT=8080
    restart: unless-stopped

secrets:
  gh_token:
    environment: GITHUB_TOKEN
