    to: company-overview
    label: "overview"
    category: navigation

  - id: company-to-activity
    from: company-dashboard
    to: activity-feed
    label: "activity"
    category: navigation

  # ── Cap Table transitions ─────────────────────────────────────
  - id: company-to-captable
