# Navigation graph for the 21st-captable shareholder registry platform
# 115 contexts, 151 transitions, 8 guards, 9 groups, 2 menus
name: twentyfirst-captable
title: "Twenty First Cap Table"
description: |
  Navigation topology for the 21st-captable shareholder registry platform.
  Models the user journey through company dashboards, shareholder management,
  equity instruments, exit planning, governance, reporting, and administration.
entry_context: global-dashboard

guards:
  - id: company-exists
    description: "Company is loaded"
    type: entity-state
    message: "Company not found"

  - id: share-classes
    description: "At least one share class exists"
    type: entity-state
    fallback: create-share-class
    message: "Create a share class first"

  - id: shares-exist
    description: "At least one share is issued"
    type: entity-state
    fallback: share-issue
    message: "Issue shares first"

  - id: shares-allowed
    description: "Registry mode allows shares (AS/ASA)"
    type: domain-rule
    message: "This organization type does not have a shareholder registry"

  - id: partners-allowed
    description: "Registry mode allows partners (ANS/DA/KS)"
    type: domain-rule
    message: "This organization type does not have a partnership registry"

  - id: members-allowed
    description: "Registry mode allows members (SA/BRL/BBL)"
    type: domain-rule
    message: "This organization type does not have a membership registry"

  - id: premium-tier
    description: "Premium subscription required"
    type: domain-rule
    message: "This feature requires a premium subscription"

  - id: instrument-at-cursor
    description: "Equity instrument selected"
    type: entity-state
    message: "Select an instrument first"

groups:
  - id: overview
    title: "Overview"
    order: 1

  - id: captable
    title: "Cap Table"
    order: 2

  - id: members
    title: "Members"
    order: 2
    visibility_guard: members-allowed

  - id: equity
    title: "Equity"
    order: 3

  - id: exit
    title: "Exit & Liquidity"
    order: 4

  - id: governance
    title: "Governance"
    order: 5

  - id: reporting
    title: "Reporting"
    order: 6

  - id: data
    title: "Records"
    order: 7

  - id: setup
    title: "Admin"
    order: 8

contexts:
  # ── Overview ──────────────────────────────────────────────────
  - id: global-dashboard
    title: "Dashboard"
    category: core
    mode: landing
    data_requirements:
      - type: companies
        qualifier: all

  - id: company-list
    title: "Organizations"
    group: overview
    category: core
    data_requirements:
      - type: companies
        qualifier: all

  - id: company-dashboard
    title: "Company Dashboard"
    parent: company-list
    group: overview
    category: core
    mode: landing
    scoped: true
    data_requirements:
      - type: company
        qualifier: current
      - type: share-capital
        qualifier: summary

  - id: company-overview
    title: "Company Overview"
    parent: company-dashboard
    group: overview
    category: core
    scoped: true

  - id: notifications
    title: "Notifications"
    parent: global-dashboard
    group: overview
    category: operations

  - id: activity-feed
    title: "Activity Feed"
    parent: company-dashboard
    group: overview
    category: operations
    scoped: true

  # ── Cap Table ─────────────────────────────────────────────────
  - id: captable-summary
    title: "Cap Table Summary"
    parent: company-dashboard
    group: captable
    category: core
    mode: landing
    scoped: true
    data_requirements:
      - type: shareholders
        qualifier: all
      - type: share-classes
        qualifier: all

  - id: shareholder-list
    title: "Shareholders"
    parent: captable-summary
    group: captable
    category: core
    scoped: true
    data_requirements:
