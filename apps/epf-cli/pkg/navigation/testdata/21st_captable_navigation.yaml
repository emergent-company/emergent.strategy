transitions:
  # ── Overview transitions ──────────────────────────────────────
  - id: dashboard-to-orgs
    from: global-dashboard
    to: company-list
    label: "organizations"
    category: navigation

  - id: dashboard-to-notifications
    from: global-dashboard
    to: notifications
    label: "notifications"
    category: navigation

  - id: dashboard-to-profile
    from: global-dashboard
    to: profile-settings
    label: "profile"
    category: navigation

  - id: orgs-to-company
    from: company-list
    to: company-dashboard
    label: "open company"
    guard: company-exists
    category: drill-down

  - id: orgs-to-create
    from: company-list
    to: company-create
    label: "create company"
    category: modal

  - id: company-to-overview
