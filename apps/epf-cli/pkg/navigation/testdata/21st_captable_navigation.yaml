    parent: shareholder-list
    group: captable
    category: core
    mode: detail
    scoped: true
    data_requirements:
      - type: shareholder
        qualifier: current
      - type: holdings
        qualifier: by-shareholder

  - id: shareholder-create
    title: "Add Shareholder"
    parent: shareholder-list
    group: captable
    category: setup
    mode: modal
    scoped: true

  - id: shareholder-edit
    title: "Edit Shareholder"
