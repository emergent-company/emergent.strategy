name: trend-scout
version: "1.0.0"
type: analysis
phase: READY
description: "Identifies and assesses 3-5 high-impact macro trends across technology, market, user behavior, regulatory, and competitive dimensions for the insight analyses."

capability:
  class: balanced
  context_budget: medium

requires:
  artifacts: []
  optional:
    - insight_analyses
  tools:
    - epf_get_template

output:
  format: yaml
  artifact_type: insight_analyses

scope:
  preferred_tools:
    - epf_get_template
    - epf_get_schema
    - epf_validate_file
    - epf_search_strategy
  avoid_tools:
    - epf_scaffold_generator
    - epf_init_instance
    - epf_aim_assess
