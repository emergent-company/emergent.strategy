name: 'canonical-decision-workflow'
initial_state: 'proposed'
states:
  - 'proposed'
  - 'deliberation'
  - 'resolved'
  - 'documented'
  - 'ratification-in-progress'
  - 'ratified'
  - 'archived'
transitions:
  - name: 'begin-deliberation'
    from: 'proposed'
    to: 'deliberation'
  - name: 'resolve'
    from: 'deliberation'
    to: 'resolved'
  - name: 'document'
    from: 'resolved'
    to: 'documented'
  - name: 'request-signatures'
    from: 'documented'
    to: 'ratification-in-progress'
  - name: 'ratify'
    from: 'ratification-in-progress'
    to: 'ratified'
  - name: 'archive'
    from: 'ratified'
    to: 'archived'
  - name: 'reject-or-recall'
    from: ['deliberation', 'resolved', 'documented', 'ratification-in-progress']
    to: 'proposed'
